services:
  # Backend Web Service (Django + Channels)
  - type: web
    name: civil-2026-chatting-backend
    env: python
    region: oregon
    plan: free
    buildCommand: cd backend && chmod +x build.sh && ./build.sh
    startCommand: cd backend && daphne chat_project.asgi:application --port $PORT --bind 0.0.0.0 -v2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: civil-2026-chatting-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://civil-2026-chatting-frontend.onrender.com,https://civil-2026-chatting-backend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://civil-2026-chatting-frontend.onrender.com,https://civil-2026-chatting-backend.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
      # SMTP Email Configuration (Gmail App Password)
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: "otpsender513@gmail.com"
      - key: SMTP_PASS
        value: "knoe mmvh iwvf wffp"
      - key: FROM_EMAIL
        value: "otpsender513@gmail.com"
      # SendGrid API (primary email - Render blocks SMTP)
      # 1. Sign up free at https://signup.sendgrid.com
      # 2. Go to Settings > Sender Authentication > verify otpsender513@gmail.com
      # 3. Go to Settings > API Keys > Create API Key
      # 4. Set SENDGRID_API_KEY in Render dashboard below
      - key: SENDGRID_API_KEY
        sync: false

  # Frontend Static Site
  - type: web
    name: civil-2026-chatting-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://civil-2026-chatting-backend.onrender.com/api
      - key: VITE_WS_URL
        value: wss://civil-2026-chatting-backend.onrender.com/ws
      - key: VITE_MEDIA_URL
        value: https://civil-2026-chatting-backend.onrender.com

databases:
  - name: civil-2026-chatting-db
    region: oregon
    plan: free
    databaseName: civil_chatting
    user: civil_user
    ipAllowList: []
